name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      stack_name:
        description: CloudFormation stack name
        required: true
        type: string
      aws_region:
        description: AWS region
        required: true
        default: us-east-2
        type: string


permissions:
  contents: read
  id-token: write

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Run import sorter (check mode)
        run: |
          isort --check-only rowlytics_app app.py

      - name: Run linters
        run: |
          flake8 rowlytics_app app.py

      - name: Run test suite
        run: python -m pytest

  a11y-playwright:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install Node dependencies
        run: npm ci

      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium

      - name: Start app
        env:
          ROWLYTICS_AUTH_REQUIRED: "false"
        run: |
          python -m flask --app rowlytics_app:create_app run --host 127.0.0.1 --port 5000 > /tmp/rowlytics.log 2>&1 &

      - name: Wait for app health
        run: |
          for i in {1..60}; do
            if curl -fsS http://127.0.0.1:5000/signin >/dev/null; then
              exit 0
            fi
            sleep 1
          done
          echo "App failed to start"
          cat /tmp/rowlytics.log
          exit 1

      - name: Run Playwright a11y tests
        env:
          A11Y_BASE_URL: http://127.0.0.1:5000
        run: npm run a11y:test

      - name: Upload Playwright HTML report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          if-no-files-found: ignore

  deploy:
    if: github.event_name == 'workflow_dispatch' || github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    env:
      stack_name: ${{ github.event_name == 'workflow_dispatch' && inputs.stack_name || 'erglytics-dev' }}
      aws_region: ${{ github.event_name == 'workflow_dispatch' && inputs.aws_region || 'us-east-2' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::793523315638:role/GitHub_Actions
          aws-region: us-east-2


      - name: Test AWS auth
        run: aws sts get-caller-identity

      - name: Build SAM app
        run: sam build --template-file backend/template.yaml

      - name: Deploy SAM app
        run: |
          sam deploy \
            --template-file .aws-sam/build/template.yaml \
            --stack-name "${{ inputs.stack_name }}" \
            --region "${{ inputs.aws_region }}" \
            --capabilities CAPABILITY_NAMED_IAM \
            --resolve-s3


      - name: Save deployment metadata
        run: |
          cat > last-stack.json <<EOF
          {
            "stackName": ${{ env.stack_name }},
            "region": "${{ env.aws_region }}",
            "run_id": ${{github.run_id}},
            "deployed_at": "$(date -u +'%Y-%m-%dT%H:%M:%SZ')"
          }
          EOF

          aws ssm put-parameter \
            --name "/Erg-lytics/last-deployed-stack" \
            --type String \
            --value "$(cat last-stack.json)" \
            --overwrite \
            --region us-east-2
